<svg width="1600" height="500"
    viewBox="0 0 1600 500"
    xmlns="http://www.w3.org/2000/svg">



  <!-- borda simples -->
  <rect x="18" y="18" width="1564" height="464"
        fill="none"
        stroke="#ffd24d"
        stroke-width="8"
        rx="22"
        ry="22"/>

  <!-- título -->
  <text x="70" y="90"
        font-size="42"
        font-family="Arial, sans-serif"
        fill="#2b2b2b">
    👾 Olá
  </text>

  <!-- descrição -->
  <text x="70" y="140"
        font-size="22"
        font-family="Arial, sans-serif"
        fill="#2b2b2b">
    Sou uma estudante de tecnologia interessada em automação, dados e desenvolvimento web.
  </text>

  <!-- bloco “stack” simplificado -->
  <text x="70" y="200"
        font-size="20"
        font-family="Arial, sans-serif"
        fill="#2b2b2b">
    Python • C • JavaScript • POO • Estruturas de Dados • APIs
  </text>

  <!-- interesses -->
  <text x="70" y="260"
        font-size="20"
        font-family="Arial, sans-serif"
        fill="#2b2b2b">
    Automação • Scraping • Web • Interfaces • Lógica • Integração de sistemas
  </text>

  <!-- nota leve -->
  <text x="70" y="340"
        font-size="18"
        font-family="Arial, sans-serif"
        fill="#444">
    Tecnologias e ferramentas abaixo no README ↓
  </text>

  <rect x="70" y="105" width="120" height="4" fill="#ffd24d"/>
          
</svg>